# environment.yml
# Conda environment for the regionalRunout avalanche pipeline.
#
# Create:    mamba env create -f environment.yml    # (or conda)
# Activate:  conda activate avalanche_mapping
# Update:    mamba env update -f environment.yml --prune
#
# conda-forge is used for the geo stack because rasterio/GDAL/proj via pip on
# Linux is a dependency-hell minefield; conda-forge ships matched pre-built
# binaries.

name: avalanche_mapping

channels:
  - conda-forge
  - nodefaults    # avoid the defaults channel mixing in incompatible builds

dependencies:
  - python=3.10   # matches the validated production env; AvaFrame supports 3.10-3.12

  # Core scientific
  - numpy>=1.24,<2.0    # AvaFrame 1.13 not fully validated against numpy 2.x
  - scipy>=1.11         # ndimage: label, watershed markers, filters
  - pandas>=2.0         # path_extraction.py (GeoDataFrame concat/aggregation)
  - scikit-image>=0.22  # release_detection.py: skimage.segmentation.watershed
                        # (two-pass PRA individualization). REQUIRED.

  # Geospatial — let conda-forge pin GDAL/PROJ/GEOS to compatible versions
  - rasterio>=1.3
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9
  - gdal           # CLI tools (gdalinfo, gdal_translate, gdalbuildvrt, etc.)

  # Optional runtime helper (imported behind try/except in resource_monitor.py,
  # adaptive_throttle.py, config.py; the pipeline runs without it via /proc)
  - psutil

  # QA / notebooks only — not imported by the pipeline
  - matplotlib
  - jupyterlab

  # Pip-only packages (AvaFrame is not on conda-forge)
  - pip
  - pip:
      - avaframe>=1.13.2     # com4FlowPy lives here; pin >=1.13.2 because
                             # flowpy_runner.py uses the lowercase forestModule
                             # naming convention introduced in 1.13.2
